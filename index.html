<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Royal Drive Pro - Fixed Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        
        /* حل مشكلة تداخل الصفحات */
        body, html { margin: 0; padding: 0; width: 100%; overflow-x: hidden; }
        .page { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #f8fafc; display: none; overflow-y: auto; z-index: 10;
        }
        .page.active { display: block; z-index: 50; }
        
        .royal-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
    </style>
</head>
<body>

<div id="app">
    <div id="welcome-page" class="page active royal-gradient flex flex-col items-center justify-center p-8 text-white">
        <div class="mb-6 text-6xl">👑</div>
        <h1 class="text-3xl font-black mb-10 tracking-widest uppercase italic">Royal Drive</h1>
        <div class="w-full max-w-xs space-y-4">
            <button onclick="showPage('login-page')" class="w-full bg-white text-slate-900 py-4 rounded-2xl font-black shadow-2xl transition active:scale-95">دخول</button>
            <button onclick="showPage('signup-page')" class="w-full border border-white/20 bg-white/5 py-4 rounded-2xl font-bold">تسجيل جديد</button>
        </div>
    </div>

    <div id="login-page" class="page flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-white p-10 rounded-[2.5rem] shadow-2xl relative">
            <h2 class="text-2xl font-black mb-8">تسجيل الدخول</h2>
            <div class="space-y-4">
                <input type="email" id="login-email" placeholder="البريد الإلكتروني" class="w-full p-4 rounded-2xl border outline-none">
                
                <div class="relative">
                    <input type="password" id="login-pass" placeholder="كلمة المرور" class="w-full p-4 rounded-2xl border outline-none">
                    <button onclick="togglePass('login-pass')" class="absolute left-4 top-4 text-slate-400">
                        <i data-lucide="eye" id="eye-icon"></i>
                    </button>
                </div>

                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg transition active:scale-95">دخول</button>
                <button onclick="handleResetPassword()" class="w-full text-xs text-blue-600 font-bold">نسيت كلمة السر؟</button>
            </div>
            <button onclick="showPage('welcome-page')" class="mt-8 block mx-auto text-slate-400 text-sm font-bold">رجوع</button>
        </div>
    </div>

    </div>

<script>
    // الإعدادات (نفس الإعدادات السابقة)
    const firebaseConfig = {
      apiKey: "AIzaSyBhZdYXdISIPlcCbC4yiVdlUx0QDWfITdk",
      authDomain: "royal-drive-38c15.firebaseapp.com",
      projectId: "royal-drive-38c15",
      storageBucket: "royal-drive-38c15.firebasestorage.app",
      messagingSenderId: "94912656002",
      appId: "1:94912656002:web:f461fdf7c3cd67b4a77a9b"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // تبديل الصفحات بشكل صحيح
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        lucide.createIcons();
    }

    // إظهار/إخفاء كلمة السر
    function togglePass(id) {
        const input = document.getElementById(id);
        const icon = document.getElementById('eye-icon');
        if (input.type === "password") {
            input.type = "text";
            icon.setAttribute('data-lucide', 'eye-off');
        } else {
            input.type = "password";
            icon.setAttribute('data-lucide', 'eye');
        }
        lucide.createIcons();
    }

    // دالة تسجيل الدخول المحسنة
    async function handleLogin() {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;
        try {
            const res = await auth.signInWithEmailAndPassword(email, pass);
            // سيتم الانتقال تلقائياً عبر onAuthStateChanged
        } catch (e) {
            alert("فشل الدخول: تأكد من الإيميل وباسوردك أو وجود إنترنت.");
        }
    }

    // باقي الدوال (Signup, route, الخ)
    // ...
</script>
</body>
</html>
